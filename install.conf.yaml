- defaults:
    link:
      relink: true
      create: true

- clean:
    - '~'
    - '~/.config'

- link:
    # Shell configurations
    ~/.bashrc: shell/bash/bashrc
    ~/.bash_profile: shell/bash/bash_profile
    ~/.zshrc: shell/zsh/zshrc
    ~/.zprofile: shell/zsh/zprofile

    # XDG config directory
    ~/.config/shell: shell/common

    # Vim
    ~/.vimrc: config/vimrc
    # ~/.vimrc.extend: config/vimrc.extend
    ~/.ideavimrc: config/ideavimrc

    # tmux
    ~/.tmux.conf: config/tmux.conf

    # Other tools
    ~/.npmrc: config/npmrc
    ~/z.lua: config/z.lua

    # pip
    ~/.pip: pip

- create:
    - ~/.config
    - ~/.config/shell
    - ~/.local/bin
    - ~/.pip

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - description: Backing up old dotfiles
      command: |
        [ -f ~/.commonrc ] && mv ~/.commonrc ~/.commonrc.backup || true
        [ -f ~/.customrc ] && mv ~/.customrc ~/.customrc.backup || true
        [ -f ~/.alias ] && mv ~/.alias ~/.alias.backup || true
